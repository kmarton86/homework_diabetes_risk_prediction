<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Páciens adatbevitel</title>
    <style>
        body {
            font-family: Arial;
            max-width: 500px;
            margin: auto;
        }
        input, select {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }
        button {
            padding: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

<h2>Páciens adatok</h2>

<form method="POST" action="/submit">

    <label>Életkor (1-120)</label>
    <input type="number" name="age" min="1" max="120" required>

    <label>Nem</label>
    <select name="sex" required>
        <option value="female">Nő</option>
        <option value="male">Férfi</option>
    </select>

    <label>BMI (0-100)</label>
    <input type="number" name="bmi" min="0" max="100" step="0.1" required>

    <label>Vérnyomás (0-200)</label>
    <input type="number" name="bp" min="0" max="200" required>

    <label>s1</label>
    <input type="number" name="s1" required>

    <label>s2</label>
    <input type="number" name="s2" required>

    <label>s3</label>
    <input type="number" name="s3" required>

    <label>s4</label>
    <input type="number" name="s4" required>

    <label>s5</label>
    <input type="number" step="0.1" name="s5" required>

    <label>s6</label>
    <input type="number" name="s6" required>

    <button type="submit">Küldés</button>

</form>

</body>
</html>
