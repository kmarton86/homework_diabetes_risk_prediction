<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction</title>

    <style>
        body {
            background-color: #001f3f;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            margin-top: 40px;
        }

        form {
            background: #003366;
            display: inline-block;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 15px;
            width: 520px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            margin-bottom: 3px;
        }

        input, select {
            font-size: 13px;
            padding: 5px;
            border: none;
            border-radius: 4px;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            width: 100%;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #00509e;
            color: white;
        }

        .full-width {
            grid-column: span 2;
        }

        #result {
            margin-top: 20px;
            background: #003366;
            display: inline-block;
            padding: 10px 15px;
            border-radius: 6px;
            min-width: 200px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Diabetes Prediction</h1>

    <form id="patientForm">

        <div class="form-grid">

            <div class="form-group">
                <label>Életkor</label>
                <input type="number" name="age" required>
            </div>

            <div class="form-group">
                <label>Nem</label>
                <select name="sex">
                    <option value="female">Nő</option>
                    <option value="male">Férfi</option>
                </select>
            </div>

            <div class="form-group">
                <label>BMI</label>
                <input type="number" name="bmi" step="0.1" required>
            </div>

            <div class="form-group">
                <label>Vérnyomás</label>
                <input type="number" name="bp" required>
            </div>

            <div class="form-group">
                <label>s1 → teljes koleszterinszint</label>
                <input type="number" name="s1" required>
            </div>

            <div class="form-group">
                <label>s2 → LDL koleszterin</label>
                <input type="number" name="s2" required>
            </div>

            <div class="form-group">
                <label>s3 → HDL koleszterin</label>
                <input type="number" name="s3" required>
            </div>

            <div class="form-group">
                <label>s4 → teljes koleszterin</label>
                <input type="number" name="s4" required>
            </div>

            <div class="form-group">
                <label>s5 → trigliceridek log-transzformált értéke</label>
                <input type="number" step="0.1" name="s5" required>
            </div>

            <div class="form-group">
                <label>s6 → vércukorszint</label>
                <input type="number" name="s6" required>
            </div>

            <div class="full-width">
                <button type="submit">Küldés</button>
            </div>

        </div>

    </form>

</div>

<div class="container">
    <!-- 🔥 Prediction KÜLÖN a form alatt -->
    <h3 id="result"></h3>
</div>

<script>
document.getElementById("patientForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText =
        "Prediction: " + result.prediction;
});
</script>

</body>
</html>
