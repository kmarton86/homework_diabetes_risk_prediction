<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Diabetes Dashboard</h1>

    <!-- MENU -->
    <div class="menu">
        <button onclick="showSection('dataset')">Dataset summary</button>
        <button onclick="showSection('viz')">Visualizations</button>
        <button onclick="showSection('predict')">Prediction</button>
    </div>

    <!-- ================= DATASET ================= -->
    <div id="dataset" class="section active">
        <div class="card">
            <h3>Dataset Summary</h3>
            <p>Itt fogod megjeleníteni a backend /dataset válaszát.</p>
        </div>
    </div>

    <!-- ================= VISUALIZATION ================= -->
    <div id="viz" class="section">
        <div class="card">
            <h3>Visualizations</h3>
            <p>Itt jönnek majd a Chart.js grafikonok.</p>
        </div>
    </div>

    <!-- ================= PREDICTION ================= -->
    <div id="predict" class="section">

        <div class="card">

            <form id="patientForm">
                <div class="form-grid">

                    <div class="form-group">
                        <label>Életkor</label>
                        <input type="number" name="age" min="0" max="120" required>
                    </div>

                    <div class="form-group">
                        <label>Nem</label>
                        <select name="sex">
                            <option value="female">Nő</option>
                            <option value="male">Férfi</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>BMI</label>
                        <input type="number" name="bmi" step="0.1" min="10" max="60" required>
                    </div>

                    <div class="form-group">
                        <label>Vérnyomás</label>
                        <input type="number" name="bp" min="50" max="250" required>
                    </div>

                    <div class="form-group">
                        <label>Teljes koleszterinszint (s1)</label>
                        <input type="number" name="s1" min="50" max="400" required>
                    </div>

                    <div class="form-group">
                        <label>LDL koleszterin (s2)</label>
                        <input type="number" name="s2" min="20" max="300" required>
                    </div>

                    <div class="form-group">
                        <label>HDL koleszterin (s3)</label>
                        <input type="number" name="s3" min="10" max="150" required>
                    </div>

                    <div class="form-group">
                        <label>Teljes koleszterin / HDL arány (s4)</label>
                        <input type="number" name="s4" step="0.1" min="1" max="20" required>
                    </div>

                    <div class="form-group">
                        <label>Trigliceridek (log érték) (s5)</label>
                        <input type="number" step="0.1" name="s5" min="0" max="10" required>
                    </div>

                    <div class="form-group">
                        <label>Vércukorszint (s6)</label>
                        <input type="number" name="s6" min="50" max="400" required>
                    </div>

                    <div class="full-width">
                        <button class="submit" type="submit">Küldés</button>
                    </div>

                </div>

            </form>

            <h3 id="result"></h3>

        </div>
    </div>

</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.section').forEach(sec => {
            sec.classList.remove('active');
        });
        document.getElementById(id).classList.add('active');
    }

    // prediction section
    // input data validation
    document.querySelectorAll("input[type='number']").forEach(input => {
        input.addEventListener("input", () => {
            if (input.validity.rangeOverflow || input.validity.rangeUnderflow) {
                input.style.borderColor = "red";
            } else {
                input.style.borderColor = "#ccd6e0";
            }
        });
    });

    document.getElementById("patientForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        const response = await fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("result").innerText =
            "Prediction: " + result.prediction;
    });
</script>

</body>
</html>
